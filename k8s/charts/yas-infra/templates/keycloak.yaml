apiVersion: v1
kind: ConfigMap
metadata:
  name: keycloak-yas-realm
data:
  yas-realm.json: |
    {
      "realm": "Yas",
      "enabled": true,
      "sslRequired": "none",
      "registrationAllowed": true,
      "roles": {
        "realm": [
          { "name": "ADMIN" },
          { "name": "CUSTOMER" }
        ]
      },
      "clients": [
        {
          "clientId": "storefront-bff",
          "enabled": true,
          "publicClient": false,
          "secret": "ZrU9I0q2uXBglBnmvyJdkl1lf0ncr8tn",
          "redirectUris": ["*"],
          "webOrigins": ["*"],
          "standardFlowEnabled": true,
          "directAccessGrantsEnabled": true
        },
        {
          "clientId": "backoffice-bff",
          "enabled": true,
          "publicClient": false,
          "secret": "TVacLC0cQ8tiiEKiTVerTb2YvwQ1TRJF",
          "redirectUris": ["*"],
          "webOrigins": ["*"],
          "standardFlowEnabled": true,
          "directAccessGrantsEnabled": true
        },
        {
          "clientId": "customer-management",
          "enabled": true,
          "publicClient": false,
          "secret": "NKAr3rnjwm9jlakgKpelukZGFaHYqIWE",
          "serviceAccountsEnabled": true,
          "directAccessGrantsEnabled": true
        },
        {
          "clientId": "swagger-ui",
          "enabled": true,
          "publicClient": true,
          "redirectUris": ["*"],
          "webOrigins": ["*"],
          "standardFlowEnabled": true
        }
      ],
      "users": [
        {
          "username": "admin",
          "enabled": true,
          "credentials": [
            { "type": "password", "value": "password", "temporary": false }
          ],
          "realmRoles": ["ADMIN"]
        }
      ]
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: identity
  labels:
    app.kubernetes.io/name: identity
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: identity
  template:
    metadata:
      labels:
        app.kubernetes.io/name: identity
    spec:
      containers:
        - name: keycloak
          image: {{ .Values.keycloak.image | quote }}
          args: ["start-dev", "--import-realm"]
          env:
            - name: KC_BOOTSTRAP_ADMIN_USERNAME
              value: {{ .Values.keycloak.adminUsername | quote }}
            - name: KC_BOOTSTRAP_ADMIN_PASSWORD
              value: {{ .Values.keycloak.adminPassword | quote }}
            - name: KC_DB
              value: postgres
            - name: KC_DB_URL
              value: jdbc:postgresql://postgresql:5432/keycloak
            - name: KC_DB_USERNAME
              value: {{ .Values.postgresql.username | quote }}
            - name: KC_DB_PASSWORD
              value: {{ .Values.postgresql.password | quote }}
            - name: KC_HTTP_PORT
              value: "8080"
            - name: KC_HEALTH_ENABLED
              value: "true"
            - name: KC_HOSTNAME_STRICT
              value: "false"
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 20
            periodSeconds: 5
            failureThreshold: 30
          resources:
            {{- toYaml .Values.keycloak.resources | nindent 12 }}
          volumeMounts:
            - name: realm
              mountPath: /opt/keycloak/data/import
      volumes:
        - name: realm
          configMap:
            name: keycloak-yas-realm
---
apiVersion: v1
kind: Service
metadata:
  name: identity
spec:
  selector:
    app.kubernetes.io/name: identity
  ports:
    - name: http
      port: 80
      targetPort: http
---
{{- if .Values.keycloak.nodePort.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: identity-nodeport
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: identity
  ports:
    - name: http
      port: 80
      targetPort: http
      nodePort: {{ .Values.keycloak.nodePort.port }}
{{- end }}

