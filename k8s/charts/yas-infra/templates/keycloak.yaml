apiVersion: apps/v1
kind: Deployment
metadata:
  name: identity
  labels:
    app.kubernetes.io/name: identity
spec:
  replicas: 1
  # Realm import must never run concurrently in two Keycloak pods. Recreate
  # also avoids the temporary second pod that a RollingUpdate would require
  # on this small single-worker assignment cluster.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: identity
  template:
    metadata:
      labels:
        app.kubernetes.io/name: identity
    spec:
      # PostgreSQL and Keycloak are installed in the same Helm release.
      # Wait for the actual Keycloak database, not only the PostgreSQL pod,
      # to avoid JDBC acquisition timeouts during the first installation.
      initContainers:
        - name: wait-for-postgresql
          image: {{ .Values.postgresql.image | quote }}
          command:
            - sh
            - -c
            - |
              until PGPASSWORD="$POSTGRES_PASSWORD" \
                pg_isready \
                  --host=postgresql \
                  --port=5432 \
                  --username="$POSTGRES_USER" \
                  --dbname=keycloak; do
                echo "Waiting for the Keycloak PostgreSQL database..."
                sleep 5
              done
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgresql-credentials
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgresql-credentials
                  key: password
      containers:
        - name: keycloak
          image: {{ .Values.keycloak.image | quote }}
          # The Yas realm is imported during the first bootstrap run.
          # Keep normal restarts/Helm upgrades on start-dev only; repeatedly
          # running --import-realm on this small lab cluster can crash Keycloak
          # with "Session not bound to a realm" after the realm is already saved.
          args: ["start-dev"]
          env:
            - name: KC_BOOTSTRAP_ADMIN_USERNAME
              value: {{ .Values.keycloak.adminUsername | quote }}
            - name: KC_BOOTSTRAP_ADMIN_PASSWORD
              value: {{ .Values.keycloak.adminPassword | quote }}
            - name: KC_DB
              value: postgres
            - name: KC_DB_URL
              value: jdbc:postgresql://postgresql:5432/keycloak
            - name: KC_DB_USERNAME
              value: {{ .Values.postgresql.username | quote }}
            - name: KC_DB_PASSWORD
              value: {{ .Values.postgresql.password | quote }}
            - name: KC_HTTP_PORT
              value: "8080"
            - name: KC_HEALTH_ENABLED
              value: "true"
            - name: KC_HOSTNAME_STRICT
              value: "false"
          ports:
            - name: http
              containerPort: 8080
          # Keycloak/Quarkus can need a few minutes to open port 8080 on the
          # low-cost GCP VMs used for this assignment.
          startupProbe:
            tcpSocket:
              port: http
            periodSeconds: 10
            failureThreshold: 60
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 20
            periodSeconds: 5
            failureThreshold: 30
          resources:
            {{- toYaml .Values.keycloak.resources | nindent 12 }}
          volumeMounts:
            - name: realm
              mountPath: /opt/keycloak/data/import
      volumes:
        - name: realm
          configMap:
            name: keycloak-yas-realm
---
apiVersion: v1
kind: Service
metadata:
  name: identity
spec:
  selector:
    app.kubernetes.io/name: identity
  ports:
    - name: http
      port: 80
      targetPort: http
---
{{- if .Values.keycloak.nodePort.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: identity-nodeport
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: identity
  ports:
    - name: http
      port: 80
      targetPort: http
      nodePort: {{ .Values.keycloak.nodePort.port }}
{{- end }}
