# Staging intentionally stays at one replica because the assignment cluster
# has only one worker. Replace the tag with the release tag produced by CI.
global:
  domain: staging.yas.local
  imageTag: v1.0.0
  environment: staging

# Different ports allow dev and staging Services to coexist. To save RAM,
# scale dev to zero before starting all staging Deployments.
nodePorts:
  enabled: true
  storefront: 30085
  backoffice: 30086
  api: 30087

yas-configuration:
  enabled: true

product:
  backend:
    replicaCount: 1
    image: { repository: ghcr.io/nashtech-garage/yas-product, tag: latest }
    serviceMonitor: { enabled: false }
    resources: &backendResources
      requests: { cpu: 25m, memory: 160Mi }
      limits: { cpu: 300m, memory: 384Mi }
media:
  backend:
    replicaCount: 1
    image: { repository: ghcr.io/nashtech-garage/yas-media, tag: latest }
    serviceMonitor: { enabled: false }
    resources: *backendResources
