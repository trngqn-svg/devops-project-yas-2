apiVersion: v1
kind: Service
metadata:
  name: storefront-nodeport
  namespace: {{ .Release.Namespace }}
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: storefront-ui
  ports:
    - port: 80
      targetPort: 3000
      nodePort: 30080
---
apiVersion: v1
kind: Service
metadata:
  name: backoffice-nodeport
  namespace: {{ .Release.Namespace }}
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: backoffice-ui
  ports:
    - port: 80
      targetPort: 3000
      nodePort: 30081
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway-nodeport
  namespace: {{ .Release.Namespace }}
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: storefront-bff
  ports:
    - port: 80
      targetPort: 8080
      nodePort: 30082 