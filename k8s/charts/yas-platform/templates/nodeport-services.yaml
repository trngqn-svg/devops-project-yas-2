{{- if .Values.nodePorts.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: storefront-nodeport
spec:
  type: NodePort
  selector:
    # The BFF proxies both /api/* and all remaining paths to storefront-ui.
    app.kubernetes.io/name: storefront-bff
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - port: 80
      targetPort: http
      nodePort: {{ .Values.nodePorts.storefront }}
---
apiVersion: v1
kind: Service
metadata:
  name: backoffice-nodeport
spec:
  type: NodePort
  selector:
    # The BFF proxies both /api/* and all remaining paths to backoffice-ui.
    app.kubernetes.io/name: backoffice-bff
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - port: 80
      targetPort: http
      nodePort: {{ .Values.nodePorts.backoffice }}
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway-nodeport
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: storefront-bff
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - port: 80
      targetPort: http
      nodePort: {{ .Values.nodePorts.api }}
{{- end }}
