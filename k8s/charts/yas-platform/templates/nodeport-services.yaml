{{- if .Values.nodePorts.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: storefront-nodeport
spec:
  type: NodePort
  selector:
    # Browser traffic should open the Next.js storefront UI directly.
    # API traffic remains exposed separately through api-gateway-nodeport.
    app.kubernetes.io/name: storefront-ui
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - port: 80
      targetPort: http
      nodePort: {{ .Values.nodePorts.storefront }}
---
apiVersion: v1
kind: Service
metadata:
  name: backoffice-nodeport
spec:
  type: NodePort
  selector:
    # Browser traffic should open the Next.js backoffice UI directly.
    app.kubernetes.io/name: backoffice-ui
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - port: 80
      targetPort: http
      nodePort: {{ .Values.nodePorts.backoffice }}
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway-nodeport
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: storefront-bff
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - port: 80
      targetPort: http
      nodePort: {{ .Values.nodePorts.api }}
{{- end }}
