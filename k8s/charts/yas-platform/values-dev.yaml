global:
  domain: dev.yas.local
  imageTag: latest
  environment: dev

yas-configuration:
  enabled: true

# --- CẤU HÌNH CHI TIẾT CHO TỪNG SUB-CHART (Ghi đè giá trị mặc định) ---

product:
  backend:
    replicaCount: 1
    image:
      repository: <DOCKERHUB_USERNAME>/yas-product
      tag: latest
    serviceMonitor:
      enabled: false
    autoscaling:
      enabled: false
    resources:
      requests: { cpu: 25m, memory: 160Mi }
      limits: { cpu: 300m, memory: 384Mi }
    env:
      media_uri: "http://media.dev"
      rating_uri: "http://rating.dev"

media:
  backend:
    replicaCount: 1
    image: { repository: <DOCKERHUB_USERNAME>/yas-media, tag: latest }
    serviceMonitor: { enabled: false }
    resources:
      requests: { cpu: 25m, memory: 128Mi }
      limits: { cpu: 200m, memory: 256Mi }

location:
  backend:
    replicaCount: 1
    image: { repository: <DOCKERHUB_USERNAME>/yas-location, tag: latest }
    serviceMonitor: { enabled: false }
    resources:
      requests: { cpu: 25m, memory: 128Mi }
      limits: { cpu: 200m, memory: 256Mi }

customer:
  backend:
    replicaCount: 1
    image: { repository: <DOCKERHUB_USERNAME>/yas-customer, tag: latest }
    serviceMonitor: { enabled: false }

cart:
  backend:
    replicaCount: 1
    image: { repository: <DOCKERHUB_USERNAME>/yas-cart, tag: latest }
    serviceMonitor: { enabled: false }
    env:
      product_uri: "http://product.dev"
      media_uri: "http://media.dev"

inventory:
  backend:
    replicaCount: 1
    image: { repository: <DOCKERHUB_USERNAME>/yas-inventory, tag: latest }
    serviceMonitor: { enabled: false }

rating:
  backend:
    replicaCount: 1
    image: { repository: <DOCKERHUB_USERNAME>/yas-rating, tag: latest }
    serviceMonitor: { enabled: false }

promotion:
  backend:
    replicaCount: 1
    image: { repository: <DOCKERHUB_USERNAME>/yas-promotion, tag: latest }
    serviceMonitor: { enabled: false }
    # Sửa lỗi typo cũ của hệ thống (uri: http://protion -> promotion) tại đây hoặc trong template code:
    uri: "http://promotion"

tax:
  backend:
    replicaCount: 1
    image: { repository: <DOCKERHUB_USERNAME>/yas-tax, tag: latest }
    serviceMonitor: { enabled: false }

order:
  backend:
    replicaCount: 1
    image: { repository: <DOCKERHUB_USERNAME>/yas-order, tag: latest }
    serviceMonitor: { enabled: false }
    env:
      cart_uri: "http://cart.dev"
      customer_uri: "http://customer.dev"
      product_uri: "http://product.dev"
      tax_uri: "http://tax.dev"
      promotion_uri: "http://promotion.dev"

payment:
  backend:
    replicaCount: 1
    image: { repository: <DOCKERHUB_USERNAME>/yas-payment, tag: latest }
    serviceMonitor: { enabled: false }

storefront-bff:
  backend:
    replicaCount: 1
    image: { repository: <DOCKERHUB_USERNAME>/yas-storefront-bff, tag: latest }
    serviceMonitor: { enabled: false }

storefront-ui:
  ui:
    replicaCount: 1
    image: { repository: <DOCKERHUB_USERNAME>/yas-storefront-ui, tag: latest }
    resources:
      requests: { cpu: 25m, memory: 128Mi }
      limits: { cpu: 200m, memory: 256Mi }

backoffice-bff:
  backend:
    replicaCount: 1
    image: { repository: <DOCKERHUB_USERNAME>/yas-backoffice-bff, tag: latest }
    serviceMonitor: { enabled: false }

backoffice-ui:
  ui:
    replicaCount: 1
    image: { repository: <DOCKERHUB_USERNAME>/yas-backoffice-ui, tag: latest }
    resources:
      requests: { cpu: 25m, memory: 128Mi }
      limits: { cpu: 200m, memory: 256Mi }