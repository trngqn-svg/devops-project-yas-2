global:
  domain: dev.yas.local
  imageTag: latest
  environment: dev

yas-configuration:
  enabled: true

product:
  backend:
    enabled: true
    replicaCount: 1
    image:
      repository: <DOCKERHUB_USERNAME>/yas-product
      tag: latest
    serviceMonitor:
      enabled: false
    autoscaling:
      enabled: false
    resources:
      requests:
        cpu: 25m
        memory: 160Mi
      limits:
        cpu: 300m
        memory: 384Mi

media:
  backend:
    enabled: true
    replicaCount: 1
    image:
      repository: <DOCKERHUB_USERNAME>/yas-media
