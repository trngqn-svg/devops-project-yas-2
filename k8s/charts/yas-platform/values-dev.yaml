# Development environment for a single 16 GiB GCP worker.
# Jenkins may override one image with:
#   --set product.backend.image.repository=<dockerhub>/yas-product
#   --set product.backend.image.tag=<commit-sha>
global:
  domain: dev.yas.local
  imageTag: latest
  environment: dev

nodePorts:
  enabled: true
  storefront: 30080
  backoffice: 30081
  api: 30082

yas-configuration:
  enabled: true

product:
  backend:
    replicaCount: 1
    image: { repository: ghcr.io/nashtech-garage/yas-product, tag: latest }
    serviceMonitor: { enabled: false }
    autoscaling: { enabled: false }
    resources:
      requests: { cpu: 25m, memory: 160Mi }
      limits: { cpu: 300m, memory: 384Mi }

